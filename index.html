<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小虾教练 · 训练仪表盘</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Fira Sans',-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0A0A0E; color:#E0E0E0;
  min-height:100vh;
  overscroll-behavior:contain;
}
code,pre,.mono{font-family:'Fira Code',monospace}

/* ===== ACCESSIBILITY ===== */
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.skip-link{position:absolute;top:-100px;left:1rem;z-index:1000;padding:0.75rem 1.25rem;
  background:#3B82F6;color:#fff;border-radius:8px;font-weight:600;text-decoration:none;transition:top 0.2s}
.skip-link:focus{top:1rem}

/* ===== FOCUS RING ===== */
:focus-visible{outline:2px solid #3B82F6;outline-offset:2px;border-radius:4px}
.tab-btn:focus-visible,.toggle-header:focus-visible,.ach-badge:focus-visible{outline:2px solid #3B82F6;outline-offset:2px;border-radius:8px}

/* ===== SKELETON LOADING ===== */
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.skeleton{
  background:linear-gradient(90deg,rgba(255,255,255,0.04) 25%,rgba(255,255,255,0.08) 50%,rgba(255,255,255,0.04) 75%);
  background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px;
}
.skeleton-card{height:120px;flex:1;min-width:200px;max-width:320px;border-radius:16px}
.skeleton-chart{height:300px;width:100%;border-radius:16px}
.skeleton-h1{height:2rem;width:300px;margin:1rem 0}
.skeleton-tabs{height:2.5rem;width:250px;margin:1.5rem 0 0.5rem}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.12)}

/* ===== ANIMATIONS ===== */
@keyframes fade-in-up{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes pulse-glow{
  0%,100%{box-shadow:0 0 24px var(--glow-color,rgba(217,119,6,0.3))}
  50%{box-shadow:0 0 48px var(--glow-color,rgba(217,119,6,0.5))}
}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:0.01ms!important}
}

/* ===== LAYOUT ===== */
#app{max-width:1440px;margin:0 auto;padding:0 2rem 2rem}

/* ===== HEADER ===== */
.header{
  position:sticky;top:0;z-index:50;
  background:rgba(10,10,14,0.95);backdrop-filter:blur(24px) saturate(180%);
  border-bottom:1px solid rgba(255,255,255,0.06);
  padding:1rem 2rem;
}
.header h1{font-size:1.25rem;font-weight:800;letter-spacing:-0.02em}

/* ===== TABS ===== */
.tab-bar{display:flex;gap:0.25rem;margin:1.5rem 0 0.5rem}
.tab-btn{
  padding:0.5rem 0.875rem;border-radius:8px;border:none;cursor:pointer;
  font-size:0.875rem;font-weight:500;color:rgba(255,255,255,0.45);
  background:transparent;transition:all 0.2s;
  font-family:inherit;min-height:44px;min-width:44px;
}
.tab-btn:hover{color:rgba(255,255,255,0.75);background:rgba(255,255,255,0.04)}
.tab-btn.active{color:#E0E0E0;background:rgba(255,255,255,0.08)}

/* ===== CARD ===== */
.card{
  padding:1.25rem;border-radius:16px;
  background:rgba(15,15,20,0.9);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 4px 24px rgba(0,0,0,0.3);
  transition:all 0.3s ease-out;
}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.card-accent{border-width:1px;box-shadow:0 4px 24px var(--card-glow-strong)}

/* ===== METRIC CARD ===== */
.metric-card{min-width:200px;flex:1;max-width:320px}
.metric-title{font-size:0.75rem;font-weight:500;text-transform:uppercase;letter-spacing:0.05em;opacity:0.7}
.metric-value{font-size:2rem;font-weight:800;line-height:1.2}
.metric-sub{font-size:0.75rem;margin-top:0.25rem;opacity:0.6}

/* ===== ROW / GRID HELPERS ===== */
.flex-row{display:flex;gap:1rem;flex-wrap:wrap}
.flex-1{flex:1}
.items-center{align-items:center}
.items-stretch{align-items:stretch}
.justify-center{justify-content:center}
.gap-0{gap:0}
.gap-1{gap:0.25rem}
.gap-2{gap:0.5rem}
.gap-3{gap:0.75rem}
.gap-4{gap:1rem}
.mt-1{margin-top:0.25rem}
.mt-2{margin-top:0.5rem}
.mt-4{margin-top:1rem}
.mt-6{margin-top:1.5rem}
.mt-10{margin-top:2.5rem}
.mt-12{margin-top:3rem}
.mb-2{margin-bottom:0.5rem}
.mb-4{margin-bottom:1rem}
.mb-6{margin-bottom:1.5rem}
.w-full{width:100%}

/* ===== STREAK FLAME ===== */
.flame-row{display:flex;align-items:baseline;gap:0.25rem}

/* ===== WEEK COMPARISON ===== */
.week-label{font-size:0.75rem;font-weight:500;text-transform:uppercase;opacity:0.5;margin-bottom:0.5rem}
.week-val{font-size:1.75rem;font-weight:700}
.week-delta{font-size:0.875rem;font-weight:600}
.week-vs{font-size:0.75rem;opacity:0.4}

/* ===== PROGRESS BAR ===== */
.progress-track{width:100%;height:0.5rem;border-radius:999px;overflow:hidden;background:rgba(255,255,255,0.06);margin-top:0.5rem}
.progress-fill{height:100%;border-radius:999px;transition:width 800ms ease-out}

/* ===== ACHIEVEMENT BADGE ===== */
.ach-grid{display:flex;flex-wrap:wrap;gap:0.75rem}
.ach-badge{
  padding:0.75rem;border-radius:12px;border:1px solid;
  min-width:110px;max-width:160px;text-align:center;
  transition:all 0.3s ease-out;cursor:pointer;position:relative;
}
.ach-badge:hover{transform:translateY(-2px)}
.ach-icon{font-size:1.5rem}
.ach-name{font-size:0.7rem;margin-top:0.25rem;font-weight:700}
.ach-progress{font-size:0.65rem}

/* ===== TOGGLE ===== */
.toggle-header{
  display:flex;align-items:center;width:100%;cursor:pointer;
  padding:0.75rem 0.5rem;transition:background 0.2s;
  border-radius:8px;user-select:none;min-height:44px;
}
.toggle-header:hover{background:rgba(255,255,255,0.03)}
.toggle-body{overflow:hidden;transition:max-height 500ms cubic-bezier(0.4,0,0.2,1)}

/* ===== SECTION HEADING ===== */
.section-heading{display:flex;align-items:center;gap:0.75rem;margin:2.5rem 0 1rem}
.section-heading h2{font-size:1.125rem;font-weight:700;letter-spacing:-0.01em;white-space:nowrap}
.section-heading .line{flex:1;height:1px;background:rgba(255,255,255,0.06)}

/* ===== SUBMISSION TABLE ===== */
.sub-row{display:flex;width:100%;padding:0.5rem 0;align-items:center;transition:all 0.15s}
.sub-row:not(:last-child){border-bottom:1px solid rgba(255,255,255,0.04)}
.sub-date{width:5.5rem;font-size:0.75rem;color:rgba(255,255,255,0.3)}
.sub-time{width:3rem;font-size:0.75rem;color:rgba(255,255,255,0.25)}
.sub-pid{width:5rem;font-size:0.8125rem;font-weight:500;font-family:'Fira Code',monospace}
.sub-plat{width:5rem;font-size:0.75rem;color:rgba(255,255,255,0.3)}
.sub-verdict{font-size:0.8125rem}

/* ===== CHART CONTAINER ===== */
.chart-box{border-radius:16px;padding:1.5rem}
.chart-box h3{font-size:0.9375rem;font-weight:700;margin-bottom:0.5rem;color:#E0E0E0}
.chart-inner{width:100%}

/* ===== FOOTER ===== */
.footer{text-align:center;margin-top:3rem;margin-bottom:1.5rem;font-size:0.75rem;color:rgba(255,255,255,0.2)}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  #app{padding:0 1rem 1rem}
  .metric-card{min-width:140px;max-width:100%}
  .flex-row{flex-direction:column}
}
</style>
</head>
<body>

<a href="#main-content" class="skip-link">跳到主内容</a>

<div class="header" role="banner">
  <h1>🦞 小虾教练 · 训练仪表盘</h1>
</div>

<!-- SKELETON LOADING -->
<div id="skeleton" style="max-width:1440px;margin:0 auto;padding:2rem">
  <div class="skeleton skeleton-tabs"></div>
  <div class="flex-row mt-4" style="gap:1rem">
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
  </div>
  <div class="skeleton skeleton-chart" style="margin-top:2.5rem"></div>
</div>

<div id="app" style="display:none" role="main" aria-label="训练仪表盘">
  <div id="main-content"></div>
  <!-- Tabs -->
  <div class="tab-bar" id="tabBar" role="tablist" aria-label="队员切换"></div>

  <!-- Metric Cards Row -->
  <div class="flex-row items-stretch mt-4" id="metricRow"></div>

  <!-- Week Comparison Row -->
  <div class="flex-row items-stretch mt-4" id="weekRow"></div>

  <!-- Unearned Achievements -->
  <div class="section-heading"><h2>🎯 待解锁成就</h2><div class="line"></div></div>
  <div class="ach-grid" id="achUnearned" role="list" aria-label="待解锁成就列表"></div>

  <!-- Earned Achievements (collapsible) -->
  <div class="card w-full mt-6">
    <div class="toggle-header" id="toggleEarned" onclick="toggleEarned()" onkeydown="if(event.key==='Enter'||event.key===' ') {event.preventDefault();toggleEarned()}" tabindex="0" role="button" aria-expanded="false" aria-label="展开已获得成就">
      <span id="toggleLabel" style="font-size:0.9375rem;font-weight:700;color:#E0E0E0">▸ 已获得成就</span>
    </div>
    <div class="toggle-body" id="earnedBody" style="max-height:0" role="region" aria-labelledby="toggleLabel">
      <div class="ach-grid mt-4" id="achEarned" role="list" aria-label="已获得成就列表"></div>
    </div>
  </div>

  <!-- Charts - Row 1: Rating curve -->
  <div class="section-heading"><h2>📈 成长轨迹</h2><div class="line"></div></div>
  <div class="card chart-box w-full">
    <h3>COAST Rating 对比曲线</h3>
    <div class="chart-inner" id="chartRatingComp" style="height:420px" role="img" aria-label="Rating 对比曲线图"></div>
  </div>

  <!-- Charts - Row 2: Calendar + Verdict -->
  <div class="flex-row mt-4">
    <div class="card chart-box flex-1">
      <h3 id="calTitle">训练日历</h3>
      <div class="chart-inner" id="chartCalendar" style="height:280px" role="img" aria-label="训练日历热力图"></div>
    </div>
    <div class="card chart-box flex-1">
      <h3 id="verdictTitle">判题分布</h3>
      <div class="chart-inner" id="chartVerdict" style="height:280px" role="img" aria-label="判题结果分布图"></div>
    </div>
  </div>

  <!-- Charts - Row 3: Difficulty + Weekly -->
  <div class="flex-row mt-4">
    <div class="card chart-box flex-1">
      <h3 id="diffTitle">难度递进</h3>
      <div class="chart-inner" id="chartDiff" style="height:360px" role="img" aria-label="难度递进散点图"></div>
    </div>
    <div class="card chart-box flex-1">
      <h3 id="weeklyTitle">每周 AC 题数</h3>
      <div class="chart-inner" id="chartWeekly" style="height:360px" role="img" aria-label="每周 AC 柱状图"></div>
    </div>
  </div>

  <!-- Charts - Row 4: Topic heatmap -->
  <div class="card chart-box w-full mt-4">
    <h3 id="topicTitle">专题掌握</h3>
    <div class="chart-inner" id="chartTopic" style="height:400px" role="img" aria-label="专题掌握堆叠柱状图"></div>
  </div>

  <!-- Team Section -->
  <div class="section-heading"><h2>👥 团队</h2><div class="line"></div></div>
  <div class="flex-row">
    <div class="card chart-box flex-1">
      <h3>COAST 团队 Rating 对比</h3>
      <div class="chart-inner" id="chartTeam" style="height:360px" role="img" aria-label="团队 Rating 对比图"></div>
    </div>
    <div class="card chart-box flex-1">
      <h3>📋 最近提交</h3>
      <div id="subTable" style="margin-top:0.75rem" role="table" aria-label="最近提交记录"></div>
    </div>
  </div>

  <div class="footer">🦞 小虾教练 · 数据: training.db · 图表: ECharts · 托管: GitHub Pages</div>
</div>

<script>
// ===== ACCENT COLOR PALETTE (13 colors, matching components.py) =====
const ACCENTS = {
  green:   {color:'#10B981',glow:'rgba(16,185,129,0.15)'},
  emerald: {color:'#34D399',glow:'rgba(52,211,153,0.15)'},
  teal:    {color:'#14B8A6',glow:'rgba(20,184,166,0.15)'},
  cyan:    {color:'#06B6D4',glow:'rgba(6,182,212,0.15)'},
  sky:     {color:'#0EA5E9',glow:'rgba(14,165,233,0.15)'},
  blue:    {color:'#3B82F6',glow:'rgba(59,130,246,0.15)'},
  purple:  {color:'#8B5CF6',glow:'rgba(139,92,246,0.15)'},
  violet:  {color:'#A78BFA',glow:'rgba(167,139,250,0.15)'},
  pink:    {color:'#EC4899',glow:'rgba(236,72,153,0.15)'},
  red:     {color:'#EF4444',glow:'rgba(239,68,68,0.15)'},
  orange:  {color:'#F97316',glow:'rgba(249,115,22,0.15)'},
  amber:   {color:'#D97706',glow:'rgba(217,119,6,0.15)'},
  yellow:  {color:'#F59E0B',glow:'rgba(245,158,11,0.15)'},
};

function accentStyle(colorName) {
  const a = ACCENTS[colorName] || ACCENTS.blue;
  const glowStrong = a.glow.replace('0.15','0.25');
  return {
    background: `linear-gradient(180deg, ${glowStrong} 0%, rgba(15,15,20,0.9) 100%)`,
    backdropFilter: 'blur(20px)',
    border: `1px solid ${a.color}66`,
    boxShadow: `0 4px 24px ${glowStrong}`,
  };
}

function accentColor(name) {
  return (ACCENTS[name]||ACCENTS.blue).color;
}

// ===== GLOBAL STATE =====
let DATA = null;
let currentHandle = 'Mianii';
let charts = {}; // echarts instances

// ===== INIT =====
async function init() {
  try {
    const resp = await fetch('data.json', {cache: 'no-cache'});
    DATA = await resp.json();
  } catch(e) {
    document.getElementById('skeleton').innerHTML =
      '<div style="text-align:center;padding:4rem;color:#EF4444">⚠️ 无法加载 data.json，请确认文件存在</div>';
    return;
  }
  currentHandle = window.location.hash.slice(1) || DATA.handles[0];
  if (!DATA.members[currentHandle]) currentHandle = DATA.handles[0];

  // 必须先显示 app 容器，否则 ECharts 在 display:none 里算不出尺寸
  document.getElementById('skeleton').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  buildTabs();
  renderAll();

  // 容器可见后再触发一次 resize，确保图表填满
  requestAnimationFrame(() => {
    Object.values(chartInstances).forEach(c => c.resize());
  });

  window.addEventListener('hashchange', () => {
    const h = window.location.hash.slice(1);
    if (h && DATA.members[h] && h !== currentHandle) {
      currentHandle = h;
      renderAll();
    }
  });
}

// ===== TABS =====
function buildTabs() {
  const bar = document.getElementById('tabBar');
  bar.innerHTML = DATA.handles.map(h => {
    const label = DATA.labels[h] || h;
    const sel = h === currentHandle;
    return `<button class="tab-btn${sel?' active':''}" role="tab" aria-selected="${sel}"
      onclick="switchMember('${h}')" tabindex="${sel?'0':'-1'}">${label}</button>`;
  }).join('');
}

function switchMember(h) {
  if (h === currentHandle) return;
  window.location.hash = h;
}

// Update tab states after render
function updateTabs() {
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    const h = DATA.handles[i];
    const sel = h === currentHandle;
    btn.classList.toggle('active', sel);
    btn.setAttribute('aria-selected', sel);
    btn.setAttribute('tabindex', sel ? '0' : '-1');
  });
}

// ===== RENDER ALL =====
function renderAll() {
  const m = DATA.members[currentHandle];
  const label = DATA.labels[currentHandle] || currentHandle;

  updateTabs();
  renderMetrics(m, label);
  renderWeekRow(m);
  renderAchievements(m);
  renderCharts(m, label);
  renderTeam(m, label);
}

// ===== METRIC CARDS =====
function renderMetrics(m, label) {
  const s = m.stats;
  const st = m.streak;
  const ach = m.achievements;
  const ratingStr = (DATA.team.summary.find(u => u.handle === currentHandle) || {}).rating || 'N/A';
  const rank = (DATA.team.summary.find(u => u.handle === currentHandle) || {}).rank || '';

  let html = '';

  // Card 1: Rating
  html += metricCardHTML(label+' · Rating', String(ratingStr),
    rank ? 'CF '+rank : '', 'green');

  // Card 2: Week AC
  html += metricCardHTML('近7天 AC', String(s.week_ac),
    'AC 率 '+s.ac_rate+'%', 'amber');

  // Card 3: Total AC
  html += metricCardHTML('累计 AC', String(s.total_ac),
    '累计提交 '+s.total_subs, 'pink');

  // Card 4: Achievements
  html += metricCardHTML('成就进度', ach.earned_count+'/'+ach.total_count,
    '专题 '+s.topic_count+'/15', 'violet');

  // Card 5: Streak or Broken
  if (st.is_broken) {
    html += cardWrap(
      accentStyle('red'),
      'min-width:200px;flex:1;max-width:320px',
      `<div class="metric-title">连续打卡</div>
       <div class="flame-row">
         <span style="font-size:1.25rem">💔</span>
         <span style="font-size:2rem;font-weight:800;color:#EF4444;line-height:1.2">断训</span>
       </div>
       <div style="color:#FCA5A5;font-size:0.75rem;margin-top:0.25rem">${st.days_since_last} 天未提交</div>`
    );
  } else {
    html += streakFlameHTML(st.current);
  }

  document.getElementById('metricRow').innerHTML = html;
}

function metricCardHTML(title, value, sub, color) {
  const ac = accentColor(color);
  return cardWrap(
    accentStyle(color),
    'min-width:200px;flex:1;max-width:320px',
    `<div class="metric-title">${title}</div>
     <div class="metric-value" style="color:${ac}">${value}</div>
     ${sub ? `<div class="metric-sub">${sub}</div>` : ''}`
  );
}

function streakFlameHTML(days) {
  let emoji, colorName, valColor;
  if (days <= 0)       { emoji='💔'; colorName='red';    valColor='#EF4444'; }
  else if (days < 3)   { emoji='🔥'; colorName='orange'; valColor='#F97316'; }
  else if (days < 7)   { emoji='🔥'; colorName='amber';  valColor='#F59E0B'; }
  else if (days < 14)  { emoji='🔥'; colorName='red';    valColor='#EF4444'; }
  else if (days < 30)  { emoji='💥'; colorName='red';    valColor='#DC2626'; }
  else                 { emoji='☀️'; colorName='amber';  valColor='#F59E0B'; }

  return cardWrap(
    accentStyle(colorName),
    'min-width:200px;flex:1;max-width:320px',
    `<div class="metric-title">连续打卡</div>
     <div class="flame-row">
       <span style="font-size:1.25rem">${emoji}</span>
       <span style="font-size:2rem;font-weight:800;color:${valColor};line-height:1.2">${days}</span>
       <span style="color:${valColor};font-size:0.875rem;font-weight:600">天</span>
     </div>
     <div class="metric-sub">连续打卡</div>`
  );
}

function cardWrap(styleObj, extraStyle, inner) {
  const s = Object.entries(styleObj).map(([k,v]) => `${k}:${v}`).join(';');
  const fullStyle = extraStyle ? s + ';' + extraStyle : s;
  return `<div class="card card-accent" style="${fullStyle}">${inner}</div>`;
}

// ===== WEEK ROW =====
function renderWeekRow(m) {
  const w = m.weekly;
  const st = m.streak;
  const nm = m.achievements.next_milestone;
  let html = '';

  // Week AC comparison
  html += weekCompHTML('本周 AC 题数', w.this_week.ac, w.last_week.ac, w.ac_delta, '✅', 'teal');

  // Week subs comparison
  html += weekCompHTML('本周提交次数', w.this_week.subs, w.last_week.subs, w.subs_delta, '📝', 'orange');

  // Longest streak
  html += cardWrap(
    accentStyle('purple'),
    'min-width:200px;flex:1;max-width:320px',
    `<div class="metric-title">历史最长打卡</div>
     <div class="flame-row">
       <span style="font-size:1.25rem">🏅</span>
       <span style="font-size:1.75rem;font-weight:700;color:#8B5CF6;line-height:1.2">${st.longest}</span>
       <span style="color:#8B5CF6;font-size:0.875rem;font-weight:600">天</span>
     </div>
     <div class="metric-sub">当前 ${st.current} 天</div>`
  );

  // Next milestone
  if (nm) {
    html += cardWrap(
      accentStyle('blue'),
      'min-width:200px;flex:1;max-width:320px',
      `<div class="metric-title">🎯 下一目标</div>
       <div style="font-size:1.125rem;font-weight:700">${nm.icon} ${nm.name}</div>
       <div class="progress-track">
         <div class="progress-fill" style="width:${nm.progress}%;background:linear-gradient(90deg,#2563EB,#3B82F6)"></div>
       </div>
       <div style="font-size:0.75rem;color:#3B82F6;margin-top:0.25rem">${nm.progress}%</div>`
    );
  }

  document.getElementById('weekRow').innerHTML = html;
}

function weekCompHTML(label, thisVal, lastVal, delta, icon, accent) {
  let arrow, clr;
  if (delta > 0)      { arrow='↑'; clr='#10B981'; }
  else if (delta < 0) { arrow='↓'; clr='#EF4444'; }
  else                { arrow='→'; clr='#6B7280'; }

  return cardWrap(
    accentStyle(accent),
    'min-width:200px;flex:1;max-width:320px',
    `<div class="week-label">${icon} ${label}</div>
     <div class="week-val">${thisVal}</div>
     <div class="flex-row gap-1" style="margin-top:0.25rem;align-items:center">
       <span class="week-delta" style="color:${clr}">${arrow} ${Math.abs(delta)}%</span>
       <span class="week-vs">vs ${lastVal}</span>
     </div>`
  );
}

// ===== ACHIEVEMENTS =====
function renderAchievements(m) {
  const all = m.achievements.achievements;
  const unearned = all.filter(a => !a.earned).slice(0, 12);
  const earned = all.filter(a => a.earned);

  // Unearned
  document.getElementById('achUnearned').innerHTML = unearned.map((a, i) =>
    achBadgeHTML(a, i * 30)
  ).join('');

  // Earned
  document.getElementById('achEarned').innerHTML = earned.map((a, i) =>
    achBadgeHTML(a, i * 20)
  ).join('');

  // Toggle label
  document.getElementById('toggleLabel').textContent =
    `▸ 已获得成就 (${earned.length}/${m.achievements.total_count})`;
}

function achBadgeHTML(a, delay) {
  let bg, border, txt, bar, shadow, badge;
  let tooltip = '';

  if (a.earned) {
    bg = 'rgba(16,185,129,0.12)'; border = 'rgba(16,185,129,0.4)';
    txt = '#10B981'; bar = '#10B981';
    shadow = '0 0 16px rgba(16,185,129,0.2)'; badge = '✅';
    const dateStr = a.earned_date || '?';
    tooltip = `解锁于 ${dateStr}\n${a.unlock_hint||''}`;
  } else if (a.progress > 70) {
    bg = 'rgba(245,158,11,0.08)'; border = 'rgba(245,158,11,0.25)';
    txt = '#F59E0B'; bar = '#F59E0B';
    shadow = 'none'; badge = '';
    tooltip = `${a.unlock_hint||''}\n进度 ${a.progress}%`;
  } else if (a.progress > 30) {
    bg = 'rgba(107,114,128,0.06)'; border = 'rgba(107,114,128,0.15)';
    txt = '#9CA3AF'; bar = '#6B7280';
    shadow = 'none'; badge = '';
    tooltip = `${a.unlock_hint||''}\n进度 ${a.progress}%`;
  } else {
    bg = 'rgba(107,114,128,0.03)'; border = 'rgba(107,114,128,0.08)';
    txt = '#6B7280'; bar = '#4B5563';
    shadow = 'none'; badge = '';
    tooltip = `${a.unlock_hint||''}\n进度 ${a.progress}%`;
  }

  const inner = `
    <div class="ach-icon">${a.icon}</div>
    <div class="ach-name" style="color:${txt}">${a.name}</div>
    ${a.earned ? `<div style="font-size:0.7rem;margin-top:0.15rem">${badge}</div>` : `
      <div class="progress-track" style="height:0.25rem;margin-top:0.25rem">
        <div class="progress-fill" style="width:${a.progress}%;background:${bar}"></div>
      </div>
      <div class="ach-progress" style="color:${txt}">${a.progress}%</div>
    `}
  `;

  return `<div class="ach-badge" role="listitem" tabindex="0" style="background:${bg};border-color:${border};box-shadow:${shadow};animation:fade-in-up 400ms ease-out ${delay}ms both" title="${tooltip.replace(/\n/g,'&#10;')}">${inner}</div>`;
}

function toggleEarned() {
  const body = document.getElementById('earnedBody');
  const label = document.getElementById('toggleLabel');
  const toggle = document.getElementById('toggleEarned');
  const isOpen = body.style.maxHeight !== '0px';
  body.style.maxHeight = isOpen ? '0' : '900px';
  const earned = DATA.members[currentHandle].achievements.achievements.filter(a => a.earned);
  const total = DATA.members[currentHandle].achievements.total_count;
  label.textContent = `${isOpen ? '▸' : '▾'} 已获得成就 (${earned.length}/${total})`;
  toggle.setAttribute('aria-expanded', !isOpen);
}

// ===== CHARTS =====
let chartInstances = {};

function disposeCharts() {
  Object.values(chartInstances).forEach(c => c.dispose());
  chartInstances = {};
}

function initChart(id) {
  const dom = document.getElementById(id);
  if (!dom) return null;
  // Clear and re-create
  dom.innerHTML = '';
  const c = echarts.init(dom, null, {renderer:'canvas'});
  chartInstances[id] = c;
  return c;
}

function renderCharts(m, label) {
  disposeCharts();
  const ch = m.charts;

  // Rating comparison (full team, shared)
  const rcDom = document.getElementById('chartRatingComp');
  rcDom.innerHTML = '';
  const rc = echarts.init(rcDom, null, {renderer:'canvas'});
  chartInstances['ratingComp'] = rc;
  rc.setOption(DATA.team.ratingComparison);

  // Calendar heatmap
  const cal = initChart('chartCalendar');
  document.getElementById('calTitle').textContent = `训练日历 · ${label}`;
  if (cal) cal.setOption(ch.calendarHeatmap);

  // Verdict pie
  const vp = initChart('chartVerdict');
  document.getElementById('verdictTitle').textContent = `判题分布 · ${label}`;
  if (vp) vp.setOption(ch.verdictPie);

  // Difficulty scatter
  const ds = initChart('chartDiff');
  document.getElementById('diffTitle').textContent = `难度递进 · ${label}`;
  if (ds) ds.setOption(ch.difficultyScatter);

  // Weekly bars
  const wb = initChart('chartWeekly');
  document.getElementById('weeklyTitle').textContent = `每周 AC 题数 · ${label}`;
  if (wb) wb.setOption(ch.weeklyBars);

  // Topic heatmap
  const th = initChart('chartTopic');
  document.getElementById('topicTitle').textContent = `专题掌握 · ${label}`;
  if (th) th.setOption(ch.topicHeatmap);

  // Team radar
  const tr = initChart('chartTeam');
  if (tr) tr.setOption(DATA.team.teamRadar);
}

// ===== TEAM (submissions table) =====
function renderTeam(m, label) {
  const subs = m.recentSubmissions || [];
  let html = '';
  for (const r of subs.slice(0, 15)) {
    const v = r.verdict;
    let vc, vw;
    if (v === 'AC') { vc = '#10B981'; vw = '700'; }
    else if (['WA','TLE','MLE','RE','CE'].includes(v)) { vc = '#EF4444'; vw = '500'; }
    else { vc = '#9CA3AF'; vw = '400'; }

    html += `<div class="sub-row">
      <span class="sub-date">${r.date||''}</span>
      <span class="sub-time">${r.time||''}</span>
      <span class="sub-pid">${r.problem||''}</span>
      <span class="sub-plat">${r.platform||''}</span>
      <span class="sub-verdict" style="font-weight:${vw};color:${vc}">${v}</span>
    </div>`;
  }
  document.getElementById('subTable').innerHTML = html || '<div style="color:rgba(255,255,255,0.3);font-size:0.875rem">暂无提交记录</div>';
}

// ===== RESIZE HANDLER =====
window.addEventListener('resize', () => {
  Object.values(chartInstances).forEach(c => c.resize());
});

// ===== BOOT =====
init();
</script>
</body>
</html>
